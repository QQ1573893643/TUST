function tag(text, color, bg){ return `<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:${bg};color:${color};font-weight:500;white-space:nowrap;">${text}</span>`; }

function examTags(id){

  const mathTag = e.math ? tag('考数学','#E24B4A','var(--color-background-danger)') : tag('不考数学','#1D9E75','var(--color-background-success)');
  const engTag = e.eng===1 ? tag('英语一','#EF9F27','var(--color-background-warning)') : tag('英语二','#1D9E75','var(--color-background-success)');
  const typeTag = e.hard==='高' ? tag('考试难度：高','#E24B4A','var(--color-background-danger)') : e.hard==='中' ? tag('考试难度：中','#EF9F27','var(--color-background-warning)') : tag(`考试难度：${e.hard}`,'#1D9E75','var(--color-background-success)');
  return `<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">${mathTag}${engTag}${typeTag}</div>`;
}

      <td style="padding:10px 12px;font-size:12px;font-weight:500;color:${mc(r.id)};white-space:nowrap;">${r.name}</td>

      <td style="padding:10px 12px;font-size:12px;text-align:center;color:${r.eng===1?'var(--color-text-warning)':'var(--color-text-success)'};">英语${r.eng}</td>
      <td style="padding:10px 12px;font-size:12px;text-align:center;font-weight:500;color:${ec(r.easy)};">${r.easy}</td>
      <td style="padding:10px 12px;font-size:12px;text-align:center;color:var(--color-text-secondary);">${r.plan}</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center;font-weight:500;color:var(--color-text-danger);">${r.line}</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center;font-weight:500;color:${mc(r.id)};">${r.median} ★</td>
      <td style="padding:10px 12px;font-size:12px;text-align:center;font-weight:500;color:${fc(r.fill)};">${r.fill}%</td>
      <td style="padding:10px 12px;font-size:12px;text-align:center;font-weight:500;color:${cc(r.comp)};">${r.comp.toFixed(2)}:1</td>
    </tr>`).join('');
  return `
  <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.04em;margin-bottom:10px;">2026届各专业数据横向对比（一志愿，排除特殊计划）</div>
  <div style="overflow-x:auto;margin-bottom:16px;">
    <table style="width:100%;border-collapse:collapse;font-family:var(--font-sans);">
      <thead><tr style="border-bottom:0.5px solid var(--color-border-secondary);">
        ${['专业','是否考数学','英语难度','综合难度','计划名额','复试线','中位数★','填满率','竞争比'].map(h=>`<th style="padding:8px 12px;font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-align:center;white-space:nowrap;letter-spacing:0.04em;">${h}</th>`).join('')}
      </tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>
  </div>
  <div style="font-size:11px;color:var(--color-text-tertiary);line-height:1.8;margin-bottom:16px;">
    <span style="color:var(--color-text-success);font-weight:500;">绿色</span>=有利 &nbsp;|&nbsp;
    <span style="color:var(--color-text-warning);font-weight:500;">橙色</span>=注意 &nbsp;|&nbsp;
    <span style="color:var(--color-text-danger);font-weight:500;">红色</span>=风险 &nbsp;|&nbsp;
    ★中位数=稳录目标分 &nbsp;|&nbsp; 填满率=一志愿实际录取/计划名额 &nbsp;|&nbsp; 竞争比=复试人数/录取人数
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;">
    ${[
      {label:'综合最容易报考',val:'食品加工与安全',sub:'英语二不考数学，进面几乎零淘汰',color:'#BA7517'},
      {label:'全院最难报考',val:'食品科学与工程（工）',sub:'数学+英语一，淘汰率31%',color:'#E24B4A'},
      {label:'最适合避数学',val:'生物与医药',sub:'2026年起改为生物化学，英语二',color:'#7F77DD'},
      {label:'一志愿最少竞争',val:'食品科学与工程（农）',sub:'仅3人报录，名额严重空缺',color:'#378ADD'},
    ].map(c=>`<div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">${c.label}</div>
      <div style="font-size:13px;font-weight:500;color:${c.color};">${c.val}</div>
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px;">${c.sub}</div>
    </div>`).join('')}
  </div>`;
}

function buildMajor(id){
  const m=MAJORS.find(x=>x.id===id);
  const d=D[id];
  const e=EXAM[id];
  const li=d.years.length-1;
  const comp=(d.retest[li]/d.admit[li]).toFixed(2);
  const fill=Math.round(d.admit[li]/d.plan[li]*100);
  const hasHist=d.years.length>1;

  const subjectPills=e.subjects.map(s=>`<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary);margin:2px;">${s}</span>`).join('');
  const mathPill=e.math?`<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--color-background-danger);color:var(--color-text-danger);font-weight:500;">含数学一</span>`:`<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--color-background-success);color:var(--color-text-success);font-weight:500;">不考数学</span>`;
  const engPill=e.eng===1?`<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--color-background-warning);color:var(--color-text-warning);font-weight:500;">英语一</span>`:`<span style="display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--color-background-success);color:var(--color-text-success);font-weight:500;">英语二</span>`;

  return `
  <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-left:3px solid ${m.color};border-radius:var(--border-radius-lg);padding:12px 16px;margin-bottom:18px;">
    <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);">${m.name}</div>
    <div style="font-size:11px;color:var(--color-text-tertiary);margin-top:2px;">${m.code} · 全日制</div>
  </div>

  ${e.changed?`<div style="background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);padding:12px 16px;margin-bottom:16px;">
    <div style="font-size:12px;font-weight:500;color:var(--color-text-warning);margin-bottom:4px;">2026年考试科目重大变更</div>
    <div style="font-size:12px;color:var(--color-text-warning);line-height:1.7;opacity:0.9;">2025年前考302数学 → 2026年起改为338生物化学。历年分数无横向比较意义，以2026年数据为准。</div>
  </div>`:''}

  <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">考试科目</div>
  <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;margin-bottom:16px;">
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${subjectPills}</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
      ${mathPill}${engPill}
      <span style="font-size:11px;color:var(--color-text-tertiary);">${e.hardNote}</span>
    </div>
  </div>

  <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">2026年核心数据</div>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px;">
    <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">计划招生</div>
      <div style="font-size:24px;font-weight:500;color:var(--color-text-primary);">${d.plan[li]}<span style="font-size:12px;margin-left:2px;">人</span></div>
    </div>
    <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">参加复试</div>
      <div style="font-size:24px;font-weight:500;color:var(--color-text-primary);">${d.retest[li]}<span style="font-size:12px;margin-left:2px;">人</span></div>
      <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">上线率 ${Math.round(d.retest[li]/d.plan[li]*100)}%</div>
    </div>
    <div style="background:var(--color-background-secondary);border:0.5px solid ${m.color};border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">一志愿录取</div>
      <div style="font-size:24px;font-weight:500;color:${m.color};">${d.admit[li]}<span style="font-size:12px;margin-left:2px;">人</span></div>
      <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">填满率 ${fill}%</div>
    </div>
    <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">竞争比</div>
      <div style="font-size:24px;font-weight:500;color:${parseFloat(comp)>1.3?'var(--color-text-danger)':parseFloat(comp)>1.1?'var(--color-text-warning)':'var(--color-text-success)'};">${comp}:1</div>
      <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:2px;">${parseFloat(comp)<=1.05?'几乎零淘汰':parseFloat(comp)<=1.3?'有一定淘汰':'淘汰压力大'}</div>
    </div>
  </div>

  <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">2026年初试分数三档</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
    <div style="background:var(--color-background-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-danger);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">复试线</div>
      <div style="font-size:28px;font-weight:500;color:var(--color-text-danger);">${d.line[li]}</div>
      <div style="font-size:11px;color:var(--color-text-danger);margin-top:2px;opacity:0.8;">低于此分无法进面</div>
    </div>
    <div style="background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-warning);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">录取最低分</div>
      <div style="font-size:28px;font-weight:500;color:var(--color-text-warning);">${d.minAdm[li]}</div>
      <div style="font-size:11px;color:var(--color-text-warning);margin-top:2px;opacity:0.8;">进面+过复试的下限</div>
    </div>
    <div style="background:var(--color-background-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-lg);padding:12px 14px;">
      <div style="font-size:10px;color:var(--color-text-success);font-weight:500;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px;">录取中位数 ★</div>
      <div style="font-size:28px;font-weight:500;color:var(--color-text-success);">${d.median[li]}</div>
      <div style="font-size:11px;color:var(--color-text-success);margin-top:2px;opacity:0.8;">稳稳上岸的目标分</div>
    </div>
  </div>

  <div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:16px;">
    <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">数据解读</div>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.8;margin-bottom:6px;"><span style="font-weight:500;color:var(--color-text-primary);">大小年规律：</span>${d.bigSmall}</div>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.8;margin-bottom:6px;"><span style="font-weight:500;color:var(--color-text-primary);">2026届分析：</span>${d.trend}</div>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.8;"><span style="font-weight:500;color:var(--color-text-primary);">备考建议：</span>${d.advice}</div>
    ${d.warn?`<div style="margin-top:10px;padding:8px 12px;background:var(--color-background-danger);border:0.5px solid var(--color-border-danger);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-danger);">${d.warn}</div>`:''}
    <div style="margin-top:10px;padding:8px 12px;background:var(--color-background-secondary);border:0.5px solid ${m.color};border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-secondary);">
      <span style="color:${m.color};font-weight:500;">综合评价：</span>${d.tip}&nbsp;&nbsp;
      <span style="color:${m.color};font-size:13px;">${d.easy}</span>
    </div>
  </div>

  ${hasHist?`
  <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;">历年分数趋势（2019—2026）${id==='bm'?'&nbsp;<span style="font-weight:500;color:var(--color-text-warning);font-size:11px;">注：2026年前考数学，分数不可横向比较</span>':''}</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px;">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><span style="width:10px;height:2px;background:#E24B4A;display:inline-block;"></span>复试线</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><span style="width:10px;height:2px;background:#EF9F27;display:inline-block;"></span>录取最低</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><span style="width:10px;height:2px;background:${m.color};display:inline-block;"></span>录取中位数 ★</span>
  </div>
  <div style="position:relative;width:100%;height:200px;margin-bottom:16px;"><canvas id="sc-${id}" role="img" aria-label="${m.name}历年分数趋势"></canvas></div>
  <div style="font-size:11px;color:var(--color-text-tertiary);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:6px;">历年招录人数趋势（2019—2026）</div>
  <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:6px;">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><span style="width:10px;height:10px;background:rgba(136,135,128,0.2);border:0.5px solid #888780;display:inline-block;"></span>计划招生</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><span style="width:10px;height:2px;background:#888780;display:inline-block;"></span>参加复试</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary);"><span style="width:10px;height:2px;background:${m.color};display:inline-block;"></span>一志愿录取</span>
  </div>
  <div style="position:relative;width:100%;height:190px;"><canvas id="cc-${id}" role="img" aria-label="${m.name}历年招录人数趋势"></canvas></div>
  `:''}`;
}

function renderCharts(id){
  const m=MAJORS.find(x=>x.id===id);
  const d=D[id];
  if(d.years.length<=1) return;
  const gc_=gc(),tc_=tc();

  if(!chartInstances['s'+id]){
    const el=document.getElementById('sc-'+id);
    if(el) chartInstances['s'+id]=new Chart(el,{type:'line',data:{labels:d.years,datasets:[
      {label:'复试线',data:d.line,borderColor:'#E24B4A',backgroundColor:'transparent',borderWidth:2,pointRadius:3,tension:0.3},
      {label:'录取最低',data:d.minAdm,borderColor:'#EF9F27',backgroundColor:'transparent',borderWidth:1.5,borderDash:[5,3],pointRadius:2,tension:0.3},
      {label:'录取中位数',data:d.median,borderColor:m.color,backgroundColor:'transparent',borderWidth:2.5,pointRadius:4,tension:0.3},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{grid:{color:gc_},ticks:{color:tc_,font:{size:11}}},
      y:{min:220,max:420,grid:{color:gc_},ticks:{color:tc_,font:{size:11}}}
    }}});
  }
  if(!chartInstances['c'+id]){
    const el=document.getElementById('cc-'+id);
    if(el) chartInstances['c'+id]=new Chart(el,{type:'bar',data:{labels:d.years,datasets:[
      {label:'计划招生',data:d.plan,backgroundColor:'rgba(136,135,128,0.18)',borderColor:'#888780',borderWidth:0.5,order:2},
      {label:'参加复试',data:d.retest,type:'line',borderColor:'#888780',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,3],pointRadius:2,tension:0.3,order:1},
      {label:'一志愿录取',data:d.admit,type:'line',borderColor:m.color,backgroundColor:'transparent',borderWidth:2.5,pointRadius:4,tension:0.3,order:0},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{grid:{color:gc_},ticks:{color:tc_,font:{size:11}}},
      y:{grid:{color:gc_},ticks:{color:tc_,font:{size:11}}}
    }}});
  }
}

function switchTab(id){
  currentTab=id;
  document.querySelectorAll('.tb').forEach(b=>{
    const m=MAJORS.find(x=>x.id===b.dataset.id);
    const active=b.dataset.id===id;
    b.style.borderBottom=active?`2px solid ${m?.color||'#888'}`:'2px solid transparent';
    b.style.color=active?(m?.color||'var(--color-text-primary)'):'var(--color-text-tertiary)';
    b.style.fontWeight=active?'500':'400';
  });
  const c=document.getElementById('app-content');
  if(id==='guide') c.innerHTML=buildGuide();
  else if(id==='compare') c.innerHTML=buildCompare();
  else { c.innerHTML=buildMajor(id); setTimeout(()=>renderCharts(id),50); }
}

function init(){
  const nav=document.getElementById('tab-nav');
  MAJORS.forEach(m=>{
    const b=document.createElement('button');
    b.className='tb'; b.dataset.id=m.id; b.textContent=m.name;
    b.style.cssText='background:none;border:none;border-bottom:2px solid transparent;color:var(--color-text-tertiary);padding:10px 14px;font-size:12px;cursor:pointer;white-space:nowrap;font-family:var(--font-sans);';
    b.addEventListener('click',()=>switchTab(m.id));
    nav.appendChild(b);
  });
  switchTab('guide');
}
if(typeof Chart!=='undefined'){init();}else{window.onload=init;}
</script>
