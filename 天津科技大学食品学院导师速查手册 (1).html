function isR(t){return REC.has(t.name)||REC.has(t.alias||'');}
function hl(s,q){if(!q)return s;return s.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<mark>${m}</mark>`);}
function mq(t,q){if(!q)return true;const l=q.toLowerCase();return t.name.toLowerCase().includes(l)||(t.alias&&t.alias.toLowerCase().includes(l))||t.dirs.some(d=>d.toLowerCase().includes(l))||(t.team&&t.team.toLowerCase().includes(l))||t.title.toLowerCase().includes(l);}

function renderTabs(){
  const w=document.getElementById('tw');
  const tot=CATS.reduce((s,c)=>s+c.teachers.length,0);
  let h=`<div class="tab on" data-t="all" onclick="go('all')">全部 <span class="n">${tot}</span></div>`;
  CATS.forEach(c=>{h+=`<div class="tab" data-t="${c.id}" onclick="go('${c.id}')">${c.title.split('·')[1].trim()} <span class="n">${c.teachers.length}</span></div>`;});
  h+=`<div class="tab" data-t="T" onclick="go('T')">🏢 团队视图</div>`;
  w.innerHTML=h;
}

function renderCats(){
  const area=document.getElementById('ma');let html='',tot=0;
  const list=tab==='all'?CATS:CATS.filter(c=>c.id===tab);
  list.forEach(cat=>{
    const ts=cat.teachers.filter(t=>{
      if(rec&&!isR(t))return false;
      if(q&&!mq(t,q))return false;
      return true;
    });
    if(!ts.length)return;
    tot+=ts.length;
    html+=`<div class="sec"><div class="sh"><div class="si2" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div><span class="st">${cat.title}</span><span class="sm">${cat.desc} · <strong>${ts.length}</strong>位</span></div><div class="grid">`;
    ts.forEach(t=>{
      const r=isR(t);
      const tc=CATS.find(c=>c.id===tab)||CATS.find(c=>c.teachers.some(x=>x.name===t.name));
      const col=tc?tc.color:'#888';
      html+=`<div class="card${r?' rec':''}"><div class="ch"><div class="nb"><div class="tn">${hl(t.name,q)}</div><div class="tm">${t.title}${t.alias?` · 亦称"${t.alias}"`:''}${t.team?` · <span style="color:var(--accent)">${t.team}</span>`:''}</div></div>${r?`<div class="rb">★ 推荐</div>`:''}</div>`;
      if(t.team)html+=`<div class="tt" style="background:${cat.color}18;border:1px solid ${cat.color}44;color:${cat.color}">${t.team}</div>`;
      html+=`<div class="dirs">`;t.dirs.forEach(d=>{html+=`<div class="di">${hl(d,q)}</div>`;});html+=`</div></div>`;
    });
    html+=`</div></div>`;
  });
  if(!tot)html=`<div class="nor"><div class="em">🔍</div>未找到匹配导师，请换个关键词</div>`;
  area.innerHTML=html;
  document.getElementById('vc').textContent=tot;
}

function renderTeams(){
  const area=document.getElementById('ma');let html='';
  TEAMS.forEach(tm=>{
    const ms=tm.members.filter(m=>{
      if(q&&!m.toLowerCase().includes(q.toLowerCase()))return false;
      if(rec&&!REC.has(m))return false;
      return true;
    });
    if(!ms.length)return;
    html+=`<div class="tblk"><div class="tbh" style="border-left:4px solid ${tm.color}"><span style="font-size:1.2rem">${tm.icon}</span><span class="tbn">${tm.name}</span><span class="tbl">负责人：${tm.leader}</span></div><div class="tbb"><div class="tbdesc">${tm.desc}</div><div class="mlist">`;
    ms.forEach(m=>{const r=REC.has(m);html+=`<div class="mbr${r?' rec':''}" onclick="gom('${m}')">${r?'★ ':''} ${m}</div>`;});
    html+=`</div></div></div>`;
  });
  if(!html)html=`<div class="nor"><div class="em">🔍</div>未找到匹配的团队成员</div>`;
  area.innerHTML=html;
  document.getElementById('vc').textContent=TEAMS.reduce((s,t)=>s+t.members.length,0);
}

function gom(n){
  tab='all';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t==='all'));
  document.getElementById('si').value=n;q=n;renderCats();
}
function go(id){
  tab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.t===id));
  id==='T'?renderTeams():renderCats();
}
document.getElementById('si').addEventListener('input',e=>{q=e.target.value;tab==='T'?renderTeams():renderCats();});
document.getElementById('btnR').addEventListener('click',function(){rec=!rec;this.classList.toggle('on',rec);this.textContent=rec?'⭐ 显示全部导师':'⭐ 仅看推荐导师';tab==='T'?renderTeams():renderCats();});
renderTabs();renderCats();
</script>
</body>
</html>
